<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инженердик Калькулятор + Валюта</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="calculator-wrapper">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('calc')"><i class="fas fa-calculator"></i> Эсептөө</button>
            <button class="tab-btn" onclick="switchTab('currency')"><i class="fas fa-dollar-sign"></i> Валюта</button>
        </div>

        <div class="tab-content active" id="calcTab">
            <div class="calculator">
                <div class="display">
                    <div class="previous-operand" id="previous"></div>
                    <div class="current-operand" id="current">0</div>
                </div>
                
                <div class="buttons">
                    <button class="btn history-toggle" onclick="toggleHistory()"><i class="fas fa-history"></i></button>
                    <button class="btn advanced-toggle" onclick="toggleAdvanced()"><i class="fas fa-square-root-alt"></i></button>
                    <button class="btn clear" onclick="clearDisplay()">C</button>
                    <button class="btn delete" onclick="deleteNumber()">DEL</button>

                    <div class="advanced-panel" id="advancedPanel">
                        <button class="btn adv-btn" onclick="calculateSquareRoot()">√</button>
                        <button class="btn adv-btn" onclick="calculateSquare()">x²</button>
                        <button class="btn adv-btn" onclick="appendOperator('%')">%</button>
                        <button class="btn adv-btn" onclick="appendNumber('(')">(</button>
                        <button class="btn adv-btn" onclick="appendNumber(')')">)</button>
                    </div>

                    <button class="btn" onclick="appendNumber('7')">7</button>
                    <button class="btn" onclick="appendNumber('8')">8</button>
                    <button class="btn" onclick="appendNumber('9')">9</button>
                    <button class="btn operator" onclick="appendOperator('/')">÷</button>

                    <button class="btn" onclick="appendNumber('4')">4</button>
                    <button class="btn" onclick="appendNumber('5')">5</button>
                    <button class="btn" onclick="appendNumber('6')">6</button>
                    <button class="btn operator" onclick="appendOperator('*')">×</button>

                    <button class="btn" onclick="appendNumber('1')">1</button>
                    <button class="btn" onclick="appendNumber('2')">2</button>
                    <button class="btn" onclick="appendNumber('3')">3</button>
                    <button class="btn operator" onclick="appendOperator('-')">-</button>

                    <button class="btn" onclick="appendNumber('0')">0</button>
                    <button class="btn" onclick="appendNumber('.')">.</button>
                    <button class="btn equals" onclick="calculate()">=</button>
                    <button class="btn operator" onclick="appendOperator('+')">+</button>
                </div>
            </div>
        </div>

        <div class="tab-content" id="currencyTab">
            <div class="converter-box">
                <h3>Валюта Конвертери</h3>
                
                <div class="input-group">
                    <label>Көлөмү:</label>
                    <input type="number" id="currencyAmount" value="1" oninput="convertCurrency()">
                </div>

                <div class="input-group">
                    <label>Андан:</label>
                    <select id="fromCurrency" onchange="convertCurrency()">
                        <option value="KGS">KGS (Кыргыз Сому)</option>
                        <option value="USD" selected>USD (АКШ Доллары)</option>
                        <option value="RUB">RUB (Орус Рубли)</option>
                        <option value="EUR">EUR (Евро)</option>
                    </select>
                </div>

                <div class="swap-btn-container">
                    <button class="swap-btn" onclick="swapCurrencies()"><i class="fas fa-exchange-alt fa-rotate-90"></i></button>
                </div>

                <div class="input-group">
                    <label>Буга:</label>
                    <select id="toCurrency" onchange="convertCurrency()">
                        <option value="KGS" selected>KGS (Кыргыз Сому)</option>
                        <option value="USD">USD (АКШ Доллары)</option>
                        <option value="RUB">RUB (Орус Рубли)</option>
                        <option value="EUR">EUR (Евро)</option>
                    </select>
                </div>

                <div class="result-box">
                    <span id="convertedResult">0.00</span> <span id="resultCurrencyName">KGS</span>
                </div>
            </div>
        </div>

        <div class="history-sidebar" id="historySidebar">
            <div class="history-header">
                <h3>Тарыхы</h3>
                <button class="btn-clear-history" onclick="clearHistory()"><i class="fas fa-trash"></i></button>
            </div>
            <div class="history-list" id="historyList">
                <p class="empty-msg">Азырынча тарых жок...</p>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
